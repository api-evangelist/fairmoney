aid: fairmoney
name: FairMoney
description: >-
  FairMoney is a credit-led digital bank for emerging markets, founded in
  2017 and headquartered in Paris, France, with operating subsidiaries in
  Nigeria and India. The company began life as a France-incubated micro-
  lending app and pivoted to focus on Africa, becoming one of the largest
  digital lenders in Nigeria after the Central Bank of Nigeria granted its
  subsidiary a Microfinance Bank (MfB) license. FairMoney's consumer mobile
  app offers near-instant collateral-free personal loans, FlexiCredit, asset
  finance, savings products (FairLock, FairSave, FairTarget, FairDollar), a
  current account, debit cards, bill payments, and peer-to-peer transfers.
  Its Business Banking arm extends current accounts, payments, and credit
  to Nigerian SMEs. In India, FairMoney operates as a digital lender
  disbursing small-ticket personal loans through its mobile app. FairMoney
  does not publish a public developer API, OpenAPI specification, SDKs, or
  a third-party developer portal; integration is internal and partner-
  driven, and the company's only public technical surface is its
  engineering GitHub organization, which mirrors infrastructure-as-code and
  open-source tooling forks (Terraform AWS modules, GitHub Actions,
  rubocop, puma plugins, salesforce_bulk_api) rather than a product API.
